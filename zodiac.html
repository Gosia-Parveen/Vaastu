<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaastu Consultant</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url("photo/wall2.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Navbar */
    .navbar {
      background-color: teal;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 10px 0;
      z-index: 1000;
    }

    .navbar a {
      color: white;
      text-align: center;
      padding: 12px 16px;
      text-decoration: none;
      font-size: 16px;
    }

    .navbar a:hover {
      background-color: #ddd;
      color: black;
    }

    /* Form container */
    .form-container {
      text-align: center;
      margin-top: 120px; /* space for navbar */
      width: 90%;
      max-width: 600px;
      background: rgba(0, 0, 0, 0.5);
      padding: 20px;
      border-radius: 10px;
      color: white;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-size: 18px;
    }

    input[type="number"], 
    input[type="button"] {
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
      width: 80%;
      max-width: 300px;
    }

    input[type="button"] {
      background-color: coral;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    input[type="button"]:hover {
      background-color: darkorange;
    }

    /* Image box */
    .image-box {
      width: 100%;
      max-width: 300px;
      height: 300px;
      margin: 20px auto;
      border: 2px solid #ccc;
      border-radius: 10px;
      background-size: cover;
      background-position: center;
    }

    /* Responsive tweaks */
    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
      }
      h1 {
        font-size: 22px;
      }
      label {
        font-size: 16px;
      }
      .image-box {
        max-width: 250px;
        height: 250px;
      }
    }
  </style>

  <script>
    function showImage() {
      var sign = [];
      sign[1]  = "photo/aqu.jpg";  // Aquarius
      sign[2]  = "photo/ari.jpg";  // Aries
      sign[3]  = "photo/can.jpg";  // Cancer
      sign[4]  = "photo/cap.jpg";  // Capricorn
      sign[5]  = "photo/gem.png";  // Gemini
      sign[6]  = "photo/lib.jpg";  // Libra
      sign[7]  = "photo/pis.jpg";  // Pisces
      sign[8]  = "photo/sag.jpg";  // Sagittarius
      sign[9]  = "photo/scor.jpg"; // Scorpio
      sign[10] = "photo/tau.jpg";  // Taurus
      sign[11] = "photo/leo.png";  // Leo
      sign[12] = "photo/virgo.jpg"; // Virgo

      var num = document.getElementById("monthInput").value;
      var box = document.getElementById("resultBox");

      if (num >= 1 && num <= 12) {
        box.style.backgroundImage = "url('" + sign[num] + "')";
      } else {
        alert("Please enter a valid month number (1-12).");
        box.style.backgroundImage = "none";
      }
    }
  </script>
</head>
<body>
  <div class="navbar">
    <a href="index.html">HOME</a>
    <a href="guru.html">OUR GURUs</a>
    <a href="zodiac.html">ZODIAC SIGNS</a>
    <a href="house_vaastu.html">HOUSE VAASTU</a>
    <a href="contact.html">CONTACT</a>
  </div>

  <div class="form-container">
    <h1><i>TO KNOW YOUR ZODIAC SIGN</i></h1>
    <label for="monthInput">Enter Month Number (1-12):</label>
    <input type="number" id="monthInput" min="1" max="12"><br>
    <input type="button" value="Show Zodiac Sign" onclick="showImage()">
    <div id="resultBox" class="image-box"></div>
  </div>
</body>
</html>
